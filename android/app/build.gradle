apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * react.gradle : configuration RN standard générée par @react-native/gradle-plugin.
 */
react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = true
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.sportcalendar"

    defaultConfig {
        applicationId "com.sportcalendar"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        // Configuration release à remplir par le développeur :
        // release {
        //     storeFile file('release.keystore')
        //     storePassword System.getenv('KEYSTORE_PASSWORD')
        //     keyAlias System.getenv('KEY_ALIAS')
        //     keyPassword System.getenv('KEY_PASSWORD')
        // }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Signature de release : le keystore doit être configuré par le dev.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst '**/armeabi-v7a/libc++_shared.so'
        pickFirst '**/x86/libc++_shared.so'
        pickFirst '**/arm64-v8a/libc++_shared.so'
        pickFirst '**/x86_64/libc++_shared.so'
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation "com.google.android.gms:play-services-auth:21.2.0"
    implementation "androidx.work:work-runtime:2.9.0"

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
